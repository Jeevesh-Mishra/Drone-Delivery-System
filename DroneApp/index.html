<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Authentication - Drone Delivery Navigation System</title>
    <meta name="description" content="Secure pilot authentication for the Drone Delivery Navigation System. Login to access your drone fleet management dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
    <!-- Top Header Bar -->
    <header class="top-header">
        <div class="brand-section">
            <div class="brand-logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div class="brand-text">
                <span class="brand-title">Drone Delivery</span>
                <span class="brand-subtitle">Navigation System</span>
            </div>
        </div>
        <div class="header-right">
            <div class="header-info-cards">
                <div class="header-info-pill">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <div>
                        <div class="pill-main">May 21, 2025</div>
                        <div class="pill-sub">Tuesday</div>
                    </div>
                </div>
                <div class="header-info-pill">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <div>
                        <div class="pill-main">10:24 AM</div>
                        <div class="pill-sub">IST</div>
                    </div>
                </div>
                <div class="header-info-pill">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
                    <div>
                        <div class="pill-main">28°C</div>
                        <div class="pill-sub">Partly Cloudy</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Login Area -->
    <main class="login-main">
        <!-- Left Side - Hero Area -->
        <div class="login-hero">
            <div class="hero-text">
                <p class="welcome-back-text">Welcome Back,</p>
                <h1 class="hero-title">Pilot Authentication</h1>
                <div class="hero-underline"></div>
            </div>
            <!-- Drone Image Placeholder -->
            <div class="hero-drone-image">
                <div class="drone-float-animation">
                    <svg width="200" height="160" viewBox="0 0 200 160" fill="none">
                        <!-- Drone body -->
                        <ellipse cx="100" cy="80" rx="25" ry="15" fill="#4A90D9" opacity="0.9"/>
                        <ellipse cx="100" cy="78" rx="20" ry="12" fill="#5BA3E8"/>
                        <!-- Arms -->
                        <line x1="75" y1="80" x2="40" y2="60" stroke="#4A90D9" stroke-width="4" stroke-linecap="round"/>
                        <line x1="125" y1="80" x2="160" y2="60" stroke="#4A90D9" stroke-width="4" stroke-linecap="round"/>
                        <line x1="75" y1="80" x2="40" y2="100" stroke="#4A90D9" stroke-width="4" stroke-linecap="round"/>
                        <line x1="125" y1="80" x2="160" y2="100" stroke="#4A90D9" stroke-width="4" stroke-linecap="round"/>
                        <!-- Propellers -->
                        <ellipse cx="40" cy="55" rx="20" ry="5" fill="#87CEEB" opacity="0.8"/>
                        <ellipse cx="160" cy="55" rx="20" ry="5" fill="#87CEEB" opacity="0.8"/>
                        <ellipse cx="40" cy="105" rx="20" ry="5" fill="#87CEEB" opacity="0.8"/>
                        <ellipse cx="160" cy="105" rx="20" ry="5" fill="#87CEEB" opacity="0.8"/>
                        <!-- Camera -->
                        <circle cx="100" cy="93" r="7" fill="#2C5F9E"/>
                        <circle cx="100" cy="93" r="4" fill="#1A3A6C"/>
                        <!-- LED lights -->
                        <circle cx="88" cy="76" r="3" fill="#00BFFF" opacity="0.9"/>
                        <circle cx="112" cy="76" r="3" fill="#00BFFF" opacity="0.9"/>
                        <!-- Glow effect -->
                        <ellipse cx="100" cy="130" rx="40" ry="8" fill="#4A90D9" opacity="0.15"/>
                    </svg>
                </div>
            </div>
            <!-- AI Robot -->
            <div class="ai-robot-container">
                <div class="robot-icon">
                    <svg width="70" height="70" viewBox="0 0 80 80" fill="none">
                        <rect x="20" y="25" width="40" height="35" rx="8" fill="#4A90D9"/>
                        <rect x="25" y="30" width="12" height="8" rx="2" fill="white" opacity="0.9"/>
                        <rect x="43" y="30" width="12" height="8" rx="2" fill="white" opacity="0.9"/>
                        <rect x="33" y="46" width="14" height="4" rx="2" fill="white" opacity="0.7"/>
                        <rect x="35" y="15" width="10" height="12" rx="3" fill="#3A7BC8"/>
                        <circle cx="40" cy="13" r="4" fill="#5BA3E8"/>
                        <rect x="10" y="35" width="8" height="20" rx="4" fill="#3A7BC8"/>
                        <rect x="62" y="35" width="8" height="20" rx="4" fill="#3A7BC8"/>
                    </svg>
                </div>
                <div class="ai-chat-bubble">
                    <p>Welcome back.</p>
                    <p>Please authenticate to begin today's mission.</p>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-form-container">
            <div class="login-card">
                <div class="login-card-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h2 class="login-card-title">Pilot Authentication</h2>

                <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" id="email" placeholder="Email" class="login-input" value="captain@dronedelivery.com">
                    </div>
                    <div class="input-group">
                        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" placeholder="Password" class="login-input" value="••••••••">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="remember-row">
                        <label class="remember-label">
                            <input type="checkbox" id="remember" checked>
                            <span>Remember Me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <button type="submit" class="login-btn" id="loginBtn">
                        LOGIN
                    </button>
                </form>

                <div class="divider"><span>or</span></div>

                <div class="social-btns">
                    <button class="social-btn" onclick="handleSocialLogin('Google')">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Continue with Google
                    </button>
                    <button class="social-btn" onclick="handleSocialLogin('Microsoft')">
                        <svg width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
                        Continue with Microsoft
                    </button>
                    <button class="social-btn" onclick="handleSocialLogin('GitHub')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        Continue with GitHub
                    </button>
                </div>
                <p class="secure-text">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Secure Drone Command Access
                </p>
            </div>
        </div>
    </main>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Authenticating...';
            btn.style.opacity = '0.8';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }

        function handleSocialLogin(provider) {
            const btn = event.target.closest('.social-btn');
            btn.style.opacity = '0.7';
            btn.textContent = `Connecting to ${provider}...`;
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }
    </script>
</body>
</html>
